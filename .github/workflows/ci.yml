name: CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  tests:
    name: Tests (PHP 8.4)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: kraite_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout kraitebot/core
        uses: actions/checkout@v4
        with:
          repository: kraitebot/core
          path: packages/kraitebot/core

      - name: Checkout brunocfalcao/ai-bridge
        uses: actions/checkout@v4
        with:
          repository: brunocfalcao/ai-bridge
          path: packages/brunocfalcao/ai-bridge

      - name: Checkout brunocfalcao/hub-ui
        uses: actions/checkout@v4
        with:
          repository: brunocfalcao/hub-ui
          path: packages/brunocfalcao/hub-ui

      - name: Checkout brunocfalcao/step-dispatcher
        uses: actions/checkout@v4
        with:
          repository: brunocfalcao/step-dispatcher
          path: packages/brunocfalcao/step-dispatcher

      - name: Checkout brunocfalcao/laravel-helpers
        uses: actions/checkout@v4
        with:
          repository: brunocfalcao/laravel-helpers
          path: packages/brunocfalcao/laravel-helpers

      - name: Checkout brunocfalcao/laravel-zepto-mail-api-driver
        uses: actions/checkout@v4
        with:
          repository: brunocfalcao/laravel-zepto-mail-api-driver
          path: packages/brunocfalcao/laravel-zepto-mail-api-driver

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, pdo_mysql, bcmath, intl
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: |
          rm -f composer.lock
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env || echo "APP_KEY=" > .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run migrations
        run: php artisan migrate --force
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kraite_tests
          DB_USERNAME: root
          DB_PASSWORD: password

      - name: Run tests
        run: php artisan test
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: kraite_tests
          DB_USERNAME: root
          DB_PASSWORD: password
